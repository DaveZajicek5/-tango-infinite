<style>
:root{--bg:#f7f5ef;--card:#fff;--line:#ddd6ca;--ink:#202124;--muted:#6b6f76;--sun:#f7b731;--sun2:#cf7624;--moon:#5aa2f2;--moon2:#1b5eb8;--bad:#d93025;--good:#188038;--hint:#dbeafe;--support:#fff7cc;--cell:min(14.2vw,58px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100svh;display:flex;justify-content:center}main{width:min(100%,520px);padding:max(16px,env(safe-area-inset-top)) 16px max(18px,env(safe-area-inset-bottom))}header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 14px}h1{font-size:30px;line-height:1;margin:0;font-weight:800;letter-spacing:-.03em}.topRight{display:flex;align-items:center;gap:8px}.pill{font-size:13px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 10px}.timer{font-variant-numeric:tabular-nums;font-size:18px;font-weight:800;background:#111827;color:#fff;border-radius:999px;padding:8px 12px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 10px 26px rgba(0,0,0,.05);padding:16px}.boardWrap{display:flex;justify-content:center;margin:8px 0 16px}.board{border-collapse:collapse;touch-action:manipulation;user-select:none}.board td{position:relative;width:var(--cell);height:var(--cell);border:3px solid var(--line);background:#fff;text-align:center;vertical-align:middle}.board td.locked{background:#eee9df}.token{display:inline-block;position:relative;width:32px;height:32px;border-radius:50%;vertical-align:middle}.sun{background:var(--sun);border:4px solid var(--sun2)}.moon{background:var(--moon);border:4px solid var(--moon2)}.moon:after{content:"";position:absolute;left:10px;top:-7px;width:30px;height:38px;border-radius:50%;background:#fff}.locked .moon:after{background:#eee9df}.hintCell .moon:after{background:var(--hint)}.supportCell .moon:after{background:var(--support)}.sg{position:absolute;z-index:5;display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--bg);color:#8a744e;font-size:22px;font-weight:800;line-height:1}.sg.r{right:-14px;top:50%;transform:translateY(-50%)}.sg.b{bottom:-14px;left:50%;transform:translateX(-50%)}.buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}button,select{border:0;border-radius:16px;padding:14px 12px;font-size:16px;font-weight:750;background:#e5e7eb;color:#202124;touch-action:manipulation}button.primary{background:#111827;color:#fff}button.secondary{background:#dbeafe;color:#0a4d9c}button:disabled{opacity:.55}button:active{transform:translateY(1px)}button.trainingActive{background:#166534;color:#fff}#msg{min-height:64px;margin-top:4px;font-size:15px;line-height:1.35;color:var(--muted)}#msg.good{color:var(--good);font-weight:750}#msg.bad{color:var(--bad);font-weight:750}.trainingPanel{display:grid;grid-template-columns:1fr auto;gap:9px;padding:11px;border:1px solid #bfdbfe;border-radius:16px;background:#eff6ff;margin-top:6px}.trainingCopy{display:grid;gap:4px}.trainingTitle{font-weight:850}.trainingMessage{font-size:14px;color:var(--muted);line-height:1.3}.trainingProgress{--progress:100%;position:relative;isolation:isolate;display:grid;place-items:center;min-width:82px;border:1px solid #93c5fd;border-radius:12px;overflow:hidden;font-weight:850;font-variant-numeric:tabular-nums}.trainingProgress:before{content:"";position:absolute;z-index:-1;inset:0 auto 0 0;width:var(--progress);background:#bfdbfe;transition:width .05s linear}.trainingControls{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:8px}.trainingControls select,.trainingControls button{width:100%;font-size:14px;padding:11px 8px}.help{font-size:14px;color:var(--muted);line-height:1.45;margin-top:12px}.legend{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.tiny{width:18px;height:18px;border-width:3px}.tiny.moon:after{left:5px;top:-5px;width:18px;height:23px}.footer{font-size:12px;color:var(--muted);text-align:center;margin-top:14px}
</style>
</head>
<body>
<main>
<header><h1>Tango∞</h1><div class="topRight"><span id="timer" class="timer">0:00</span><span class="pill">offline PWA</span></div></header>
<section class="card">
<div class="boardWrap"><table id="board" class="board" aria-label="Tango grid"></table></div>
<div class="buttons"><button id="new" class="primary">Nová hra</button><button id="hint" class="secondary">Nápověda</button><button id="reset">Reset</button><button id="check">Zkontrolovat</button><button id="trainingToggle" style="grid-column:1/-1">Trénink: vypnutý</button></div>
<section id="trainingPanel" class="trainingPanel" hidden><div class="trainingCopy"><div class="trainingTitle">Step Coach</div><div id="trainingMessage" class="trainingMessage">Najdi další logický krok.</div></div><div id="trainingProgress" class="trainingProgress">5.0 s</div><div class="trainingControls"><select id="trainingDelay" aria-label="Čas na krok"><option value="3">3 s na krok</option><option value="5" selected>5 s na krok</option><option value="8">8 s na krok</option><option value="12">12 s na krok</option></select><button id="trainingSkip">Ukaž krok hned</button></div></section>
<div id="msg"></div>
<div class="help"><div class="legend"><span>Klepnutím střídáš</span><span class="token sun tiny"></span><span>→</span><span class="token moon tiny"></span><span>→ prázdné.</span></div><p>Červeně se značí jen okamžité porušení pravidel: víc než 3 symboly v řádku/sloupci, tři stejné vedle sebe, nebo porušené =/×.</p></div>
</section>
<div class="footer">Generované lokálně v telefonu. Žádný denní limit.</div>
</main>
